name: SlateHelper

options:
  bundleIdPrefix: com.slate
  createIntermediateGroups: true
  deploymentTarget:
    macOS: "14.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    ENABLE_APP_SANDBOX: NO

targets:
  SlateHelper:
    type: application
    platform: macOS
    sources:
      - path: SlateHelper
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.slate.helper
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: SlateHelper/Info.plist
        PRODUCT_NAME: SlateHelper
    scheme:
      testTargets:
        - SlateHelperTests

  SlateHelperTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: SlateHelperTests
    dependencies:
      - target: SlateHelper
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.slate.helper.tests
