name: ci

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  ts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm verify

  swift:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - run: brew install xcodegen
      - run: xcodegen generate
        working-directory: helpers/mac-helper
      - run: xcodebuild -project SlateHelper.xcodeproj -scheme SlateHelper -destination 'platform=macOS' test
        working-directory: helpers/mac-helper
